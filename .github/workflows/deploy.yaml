name: Deploy Nekofolio - Production Standard

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [ closed ]

jobs:
  # --- GIAI ĐOẠN CI: BUILD & TEST ---
  ci-build:
    runs-on: ubuntu-latest

    # Chỉ chạy khi push vào main, hoặc khi PR được merge vào main
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Validate lock file is in sync
        run: |
          if ! npm ci --dry-run 2>/dev/null; then
            echo "❌ package-lock.json is out of sync with package.json"
            echo "👉 Run 'npm install' locally and commit the updated lock file"
            exit 1
          fi

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: |
            dist/
            package.json
            package-lock.json
          retention-days: 1

  # --- GIAI ĐOẠN CD: DEPLOY VỚI APPROVAL ---
  cd-deploy:
    needs: ci-build
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://man-nguyen.com

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files

      - name: Deploy to EC2 via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/,package.json,package-lock.json"
          target: "~/apps/nekofolio-api"

      - name: Restart Application via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd ~/apps/nekofolio-api

            echo "📦 Installing production dependencies..."
            npm install --omit=dev

            echo "🔄 Reloading application..."
            pm2 reload nekofolio-api || pm2 start dist/main.js --name nekofolio-api

            echo "⏳ Waiting for app to be ready..."
            sleep 3

            echo "🏥 Health check..."
            curl -sf http://localhost:3000/health || {
              echo "❌ Health check failed! Rolling back..."
              pm2 logs nekofolio-api --lines 30 --nostream
              exit 1
            }

            echo "✅ Deploy successful!"
            pm2 status nekofolio-api